# New window inherits current directory
bind c new-window -c "#{pane_current_path}"

# Splits (| and - as visual mnemonics, also inherit cwd)
bind | split-window -h -c "#{pane_current_path}"
bind \\ split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Move between panes without prefix
bind -n C-h select-pane -L
bind -n C-l select-pane -R
bind -n C-j select-pane -D
bind -n C-k select-pane -U

# Pane resize
bind -r H resize-pane -L 2
bind -r J resize-pane -D 2
bind -r K resize-pane -U 2
bind -r L resize-pane -R 2

# vim copy mode
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
if-shell "command -v wl-copy"  "set -g copy-command 'wl-copy'"
if-shell "command -v pbcopy"   "set -g copy-command 'pbcopy'"
if-shell "command -v xclip"    "set -g copy-command 'xclip -selection clipboard'"
